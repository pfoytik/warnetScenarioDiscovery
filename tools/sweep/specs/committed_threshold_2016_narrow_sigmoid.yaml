name: committed_threshold_2016_narrow_sigmoid
description: >
  Narrow sweep to pin the exact committed_split flip-point at 2016-block retarget
  with sigmoid oracle. Direct companion to committed_threshold_2016_narrow (baseline).

  RESEARCH QUESTION:
  committed_2016_sigmoid showed sigmoid does NOT shift the committed_split threshold —
  split=0.20 still fails and split=0.30 still succeeds. Does the exact threshold
  within (0.20, 0.30) shift with sigmoid, or is it identical to baseline?
  The sigmoid oracle amplifies the price signal, which could lower the minimum
  committed hashrate needed to sustain the cascade.

  PRIOR CONTEXT:
  - committed_2016_sigmoid (econ=0.78, sigmoid): threshold still ∈(0.20, 0.30)
  - committed_threshold_2016_narrow (baseline): pins exact baseline threshold
  - sigmoid_2016_retarget: cascade_t halved (8426→4239s), v26 blocks halved (1543→799)
  - If sigmoid fires the cascade faster, v27 may win at a lower committed_split
    than baseline (threshold shifts left) — or it may not (same discrete pool step)

  COMMITTED_SPLIT INTERPRETATION (neutral=30%):
    committed_split=0.22: v27=15.4%, v26=54.6%, neutral=30%
    committed_split=0.24: v27=16.8%, v26=53.2%, neutral=30%
    committed_split=0.26: v27=18.2%, v26=51.8%, neutral=30%
    committed_split=0.28: v27=19.6%, v26=50.4%, neutral=30%

  Run AFTER committed_threshold_2016_narrow completes (Round 2 of Option A).

  Run command (4 parallel namespaces):
    kubectl create namespace cthr2016s-0
    kubectl create namespace cthr2016s-1
    kubectl create namespace cthr2016s-2
    kubectl create namespace cthr2016s-3

    python tools/sweep/3_run_sweep.py \
      --input tools/sweep/committed_threshold_2016_narrow_sigmoid/build_manifest.json \
      --scenarios sweep_0000 --namespace cthr2016s-0 \
      --results-dir committed_threshold_2016_narrow_sigmoid/results \
      --duration 13000 --retarget-interval 2016 --interval 2 --use-sigmoid &
    (repeat for sweep_0001/0002/0003)

  Wall-clock: 4 scenarios × 13,000s parallel = 13,000s ≈ 3.6h

network: lite

fixed:
  economic_split: 0.78
  hashrate_split: 0.50
  pool_neutral_pct: 30.0
  pool_ideology_strength: 0.51
  pool_profitability_threshold: 0.16
  pool_max_loss_pct: 0.26
  econ_ideology_strength: 0.40
  econ_switching_threshold: 0.10
  econ_inertia: 0.05
  user_ideology_strength: 0.49
  user_switching_threshold: 0.12
  transaction_velocity: 0.50
  user_nodes_per_partition: 6
  economic_nodes_per_partition: 2
  solo_miner_hashrate: 0.085

grid:
  pool_committed_split: [0.22, 0.24, 0.26, 0.28]
