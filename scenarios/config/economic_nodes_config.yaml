      ideology_strength: 0.2
    - pct: 20
      fork_preference: v26
      ideology_strength: 0.2
    - pct: 10
      fork_preference: neutral
      ideology_strength: 0.0
    user:
    - pct: 60
      fork_preference: v27
      ideology_strength: 0.15
    - pct: 25
      fork_preference: v26
      ideology_strength: 0.15
    - pct: 15
      fork_preference: neutral
      ideology_strength: 0.0
