name: switching_neutral_fraction
description: >
  Validates that dynamic economic node switching works by sweeping
  econ_neutral_fraction with sigmoid pricing enabled.

  Non-neutral nodes (ideology=0.40) have effective_threshold=0.10*(1+0.8)=18%,
  which is above the actual ~14.3% price gap → WON'T switch.
  Neutral nodes (ideology=0.0) have effective_threshold=0.10*(1+0.0)=10%,
  which is clearly below the 14.3% gap → WILL switch.

  This cleanly isolates the neutral fraction effect: only the neutral nodes
  switch, so varying their fraction produces a proportional change in v27_econ_share.

  Previous run (threshold=0.14, inertia=0.17) showed zero switching in all
  scenarios because 14.3% gap barely exceeded the 14% threshold and probabilistic
  inertia (17%) blocked every switch attempt. Fixed: threshold=0.10, inertia=0.05.

  Expected gradient:
    econ_neutral_fraction=0.00 → v27_econ_share flat (~56.7%), no switching
    econ_neutral_fraction=0.50 → partial switching, v27_econ_share drifts toward winner
    econ_neutral_fraction=1.00 → full switching, v27_econ_share approaches 100%

  Also watch cascade speed: more neutral switching → wider price gap → faster
  pool cascade → fewer v26 blocks → lower reorg_mass.

  Run with:
    python 3_run_sweep.py \
      --input switching_neutral_fraction/build_manifest.json \
      --namespace sweep-neutral-frac \
      --results-dir switching_neutral_fraction/results \
      --duration 4000 --retarget-interval 144 --interval 2 \
      --use-sigmoid

  Namespace to create first:
    kubectl create namespace sweep-neutral-frac

network: lite

fixed:
  economic_split: 0.60
  hashrate_split: 0.50
  pool_committed_split: 0.35
  pool_neutral_pct: 30.0
  pool_ideology_strength: 0.51
  pool_profitability_threshold: 0.16
  pool_max_loss_pct: 0.26
  econ_ideology_strength: 0.40
  econ_switching_threshold: 0.10
  econ_inertia: 0.05
  user_ideology_strength: 0.49
  user_switching_threshold: 0.12
  transaction_velocity: 0.50
  user_nodes_per_partition: 6
  economic_nodes_per_partition: 4
  solo_miner_hashrate: 0.085

grid:
  econ_neutral_fraction: [0.0, 0.50, 1.0]
