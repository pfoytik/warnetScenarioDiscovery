name: committed_2016_sigmoid_midecon
description: >
  Maps the sigmoid oracle's econ-switching behavior at mid economic support (econ=0.55).
  Companion to committed_2016_sigmoid (same committed_split grid, econ=0.78, sigmoid).

  RESEARCH QUESTION:
  committed_2016_sigmoid showed that sigmoid enables full econ switching (56.7%→100%) when
  econ=0.78 and committed_split≥0.30, yielding peak_gap=40.5% and full_switch at t=7265s.
  But sigmoid_2016_retarget/results_sigmoid_v2 with econ=0.35–0.70 and committed_split=0.35
  showed no econ switching (peak_gap=21.6%). Is econ=0.78 uniquely required for the sigmoid
  econ-switching effect, or does econ=0.55 also trigger it?

  MECHANISM:
  The sigmoid-enabled econ switching requires a sustained price gap above the effective
  switching threshold (~18%). With econ=0.78, the stronger econ_f component (even at 1 node)
  combines with sigmoid amplification to push peak_gap to ~40%. At econ=0.55, the econ_f
  contribution is weaker — the combined signal may or may not sustain above threshold.
  If no econ switching occurs at econ=0.55, this establishes an econ dimension to the
  sigmoid switching boundary (between 0.55 and 0.78).

  PRIOR CONTEXT:
  - committed_2016_sigmoid (econ=0.78, sigmoid): full_switch, peak_gap=40.5%, switch_t=7265s
  - committed_2016_mid_econ (econ=0.55, baseline): no_switch, peak_gap=16.1% — same as high econ
  - sigmoid_2016_retarget/results_sigmoid_v2 (econ=0.35–0.70, committed=0.35): no_switch, 21.6%
  - Effective econ switching threshold: ~18% (threshold=0.10 * (1 + 0.40*2.0))
  - The 21.6% gap in sigmoid_2016_retarget marginally exceeds threshold but econ switching
    did not occur — likely insufficient gap duration to overcome inertia=0.05

  EXPECTED OUTCOMES:
  - If econ=0.55 also triggers full_switch: sigmoid econ switching is NOT econ-level dependent
    above the quantization boundary; threshold is committed_split×oracle interaction only
  - If econ=0.55 shows no_switch (peak_gap≈21–25%): econ=0.78 is special; the econ dimension
    sets the boundary for sigmoid-enabled switching, which would be a new finding for §4.6

  COMMITTED_SPLIT INTERPRETATION:
    committed_split=0.20: v27=14%, v26=56%, neutral=30%
    committed_split=0.30: v27=21%, v26=49%, neutral=30%
    committed_split=0.40: v27=28%, v26=42%, neutral=30%
    committed_split=0.50: v27=35%, v26=35%, neutral=30%

  Run command (4 parallel namespaces, 1 scenario each — fits in ~4h):
    kubectl create namespace sweep-sigm55-0
    kubectl create namespace sweep-sigm55-1
    kubectl create namespace sweep-sigm55-2
    kubectl create namespace sweep-sigm55-3

    python tools/sweep/3_run_sweep.py \
      --input tools/sweep/committed_2016_sigmoid_midecon/build_manifest.json \
      --scenarios sweep_0000 --namespace sweep-sigm55-0 \
      --results-dir committed_2016_sigmoid_midecon/results \
      --duration 13000 --retarget-interval 2016 --interval 2 --use-sigmoid &

    python tools/sweep/3_run_sweep.py \
      --input tools/sweep/committed_2016_sigmoid_midecon/build_manifest.json \
      --scenarios sweep_0001 --namespace sweep-sigm55-1 \
      --results-dir committed_2016_sigmoid_midecon/results \
      --duration 13000 --retarget-interval 2016 --interval 2 --use-sigmoid &

    python tools/sweep/3_run_sweep.py \
      --input tools/sweep/committed_2016_sigmoid_midecon/build_manifest.json \
      --scenarios sweep_0002 --namespace sweep-sigm55-2 \
      --results-dir committed_2016_sigmoid_midecon/results \
      --duration 13000 --retarget-interval 2016 --interval 2 --use-sigmoid &

    python tools/sweep/3_run_sweep.py \
      --input tools/sweep/committed_2016_sigmoid_midecon/build_manifest.json \
      --scenarios sweep_0003 --namespace sweep-sigm55-3 \
      --results-dir committed_2016_sigmoid_midecon/results \
      --duration 13000 --retarget-interval 2016 --interval 2 --use-sigmoid &

  Wall-clock: 4 scenarios × 13,000s parallel = 13,000s ≈ 3.6h

network: lite

fixed:
  hashrate_split: 0.50
  pool_neutral_pct: 30.0
  pool_ideology_strength: 0.51
  pool_profitability_threshold: 0.16
  pool_max_loss_pct: 0.26
  econ_ideology_strength: 0.40
  econ_switching_threshold: 0.10
  econ_inertia: 0.05
  user_ideology_strength: 0.49
  user_switching_threshold: 0.12
  transaction_velocity: 0.50
  user_nodes_per_partition: 6
  economic_nodes_per_partition: 2
  solo_miner_hashrate: 0.085
  economic_split: 0.55

grid:
  pool_committed_split: [0.20, 0.30, 0.40, 0.50]
