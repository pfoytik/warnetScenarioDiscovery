name: committed_2016_mid_econ
description: >
  Maps the committed_split threshold in the 2016-block retarget regime at moderate
  economic support (econ=0.55). Companion to committed_2016_high_econ.

  RESEARCH QUESTION:
  Does lower economic support shift the committed_split threshold in the 2016-block regime?
  At econ=0.55 vs econ=0.78, the initial price gap is smaller (~4.4% vs ~12.8% v27 premium).
  Smaller initial gap means neutral pools drift more slowly toward v27, potentially requiring
  more committed v27 hashrate to reach 2016 blocks before v26 retargets.

  PRIOR CONTEXT:
  - econ=0.55 confirmed v27_dominant at committed_split=0.35 in econ_threshold_2016_v2
  - econ=0.55 maps to 1 economic node on v27 (56.7% custody, same as 0.35–0.70)
  - Cascade timing at econ=0.55 (1 node, baseline): similar to ≈8426s as at econ=0.78
  - The economic support level affects NEUTRAL pool drift speed, not committed pools

  PRICE GAP AT START (econ contribution only):
    econ_f_v27 = 0.8 + 0.55*0.4 = 1.02; econ_f_v26 = 0.8 + 0.45*0.4 = 0.98
    Initial gap ≈ 4% (small, neutral pools drift slowly)
  vs econ=0.78:
    gap ≈ 12.8% (large, neutral pools drift quickly to v27)

  COMMITTED_SPLIT INTERPRETATION:
    committed_split=0.20: v27=14%, v26=56%, neutral=30%
    committed_split=0.30: v27=21%, v26=49%, neutral=30%
    committed_split=0.40: v27=28%, v26=42%, neutral=30%
    committed_split=0.50: v27=35%, v26=35%, neutral=30%  (symmetric)

  Run command:
    python tools/sweep/3_run_sweep.py \
      --input tools/sweep/committed_2016_mid_econ/build_manifest.json \
      --namespace sweep-com2016-mid \
      --results-dir committed_2016_mid_econ/results \
      --duration 13000 --retarget-interval 2016 --interval 2

  Namespace to create first:
    kubectl create namespace sweep-com2016-mid

  Wall-clock: 4 scenarios × 13,000s = 52,000s ≈ 14.4h

network: lite

fixed:
  hashrate_split: 0.50
  pool_neutral_pct: 30.0
  pool_ideology_strength: 0.51
  pool_profitability_threshold: 0.16
  pool_max_loss_pct: 0.26
  econ_ideology_strength: 0.40
  econ_switching_threshold: 0.10
  econ_inertia: 0.05
  user_ideology_strength: 0.49
  user_switching_threshold: 0.12
  transaction_velocity: 0.50
  user_nodes_per_partition: 6
  economic_nodes_per_partition: 2
  solo_miner_hashrate: 0.085
  economic_split: 0.55

grid:
  pool_committed_split: [0.20, 0.30, 0.40, 0.50]
