name: ucf_threshold_probe
description: >
  2-scenario bracketing probe to narrow the user_custody_fraction (ucf) reversal
  threshold identified in user_weight_mini_test.

  KNOWN BOUNDS (from mini_test):
  - ucf=0.01, split=0.50 → v27 wins  (sweep_0000)
  - ucf=0.65, split=0.50 → v26 wins  (sweep_0002, reversal via econ dilution)

  Threshold is somewhere in [0.01, 0.65]. This probe places two points from the
  user_weight_threshold.yaml full grid to pre-compute the most informative bracket:
  - ucf=0.20 (lower quarter — does dilution kick in this early?)
  - ucf=0.35 (near midpoint — near the Foundry flip-point, most contested region)

  DECISION TABLE:
    ucf=0.20   ucf=0.35   → interpretation
    v27 wins   v27 wins   → threshold > 0.35, narrows to [0.35, 0.65]
    v27 wins   v26 wins   → threshold between 0.20–0.35 (tight bracket)
    v26 wins   v26 wins   → threshold < 0.20 (surprisingly low, strong user effect)

  user_split fixed at 0.50 (neutral) — the adversarial dilution case that produced
  the reversal. This is the minimum-influence scenario, giving the strongest
  possible null bound.

  RUNTIME: 1 namespace, ~7.2 hours sequential (2 × 3.6 hrs).
  NOTE: Both scenarios are grid members of user_weight_threshold.yaml (ucf ∈ {0.20, 0.35},
  split=0.50), so these results feed directly into tomorrow's full 30-scenario run.

network: full
retarget_interval: 2016
duration: 13000

# All parameters fixed at user_weight_mini_test values for direct comparability
fixed:
  economic_split: 0.60
  pool_committed_split: 0.35          # near Foundry flip-point, contested region
  pool_ideology_strength: 0.62        # PRIM zone midpoint
  pool_max_loss_pct: 0.28             # PRIM zone midpoint
  pool_neutral_pct: 30.0
  hashrate_split: 0.25
  pool_profitability_threshold: 0.16
  solo_miner_hashrate: 0.085
  econ_ideology_strength: 0.40
  econ_switching_threshold: 0.10
  econ_inertia: 0.05
  user_ideology_strength: 0.49
  user_switching_threshold: 0.12
  transaction_velocity: 0.50
  economic_nodes_per_partition: 2
  user_nodes_per_partition: 6
  user_split: 0.50                    # neutral users — adversarial dilution case

# 2 scenarios — values chosen from user_weight_threshold.yaml full grid
grid:
  user_custody_fraction: [0.20, 0.35]
