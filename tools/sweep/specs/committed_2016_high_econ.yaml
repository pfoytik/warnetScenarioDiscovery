name: committed_2016_high_econ
description: >
  Maps the committed_split threshold in the 2016-block retarget regime at high economic
  support (econ=0.78). Companion to targeted_sweep1_committed_threshold (144-block)
  and targeted_sweep6_pool_ideology_full.

  RESEARCH QUESTION:
  In the 144-block regime, v27 loses when committed_split ≲ 0.214 (v27 gets only ~15%
  of committed hashrate). Does this threshold shift in the 2016-block regime, where v27
  must accumulate 2016 blocks to trigger the retarget cascade?

  MECHANISM IN 2016-BLOCK REGIME:
  - Committed v27 pools mine v27 from t=0; neutral pools (30%) drift based on price
  - v27 must reach 2016 blocks BEFORE v26 retargets (v26 retargets at t≈8100s based on sweep9)
  - If committed_split is too low, v27 lacks hashrate to accumulate 2016 blocks in time
  - Once v27 retargets, committed v26 pool losses jump from ~9% → ~56%, far above 13.26%
    tolerance → cascade completes ~4000s post-retarget

  PRIOR CONTEXT:
  - At committed_split=0.35 (standard), v27 gets 24.5% of hashrate → wins (sweep10b+)
  - At committed_split=0.214 (144-block threshold), v27 gets ~15% committed hashrate
  - econ=0.78 ensures 1 economic node on v27 (confirmed via econ_switching_144_verify)
  - Cascade timing at econ=0.78 (1 node): baseline t≈8426s; sigmoid t≈4239s

  COMMITTED_SPLIT INTERPRETATION:
    v27_pct = (1 - neutral_pct/100) * committed_split = 0.70 * committed_split
    committed_split=0.20: v27=14%, v26=56%, neutral=30%
    committed_split=0.30: v27=21%, v26=49%, neutral=30%
    committed_split=0.40: v27=28%, v26=42%, neutral=30%
    committed_split=0.50: v27=35%, v26=35%, neutral=30%  (symmetric)

  EXPECTED OUTCOMES:
  - committed_split=0.50 (symmetric): v27 should win — same as our standard sweeps
  - committed_split=0.30 (~144-block threshold): near the transition — may go either way
  - committed_split=0.20: v27 has only 14% committed — likely v26_dominant
  - Threshold expected somewhere in [0.20, 0.40]

  Run command:
    python tools/sweep/3_run_sweep.py \
      --input tools/sweep/committed_2016_high_econ/build_manifest.json \
      --namespace sweep-com2016-hi \
      --results-dir committed_2016_high_econ/results \
      --duration 13000 --retarget-interval 2016 --interval 2

  Namespace to create first:
    kubectl create namespace sweep-com2016-hi

  Wall-clock: 4 scenarios × 13,000s = 52,000s ≈ 14.4h

network: lite

fixed:
  hashrate_split: 0.50
  pool_neutral_pct: 30.0
  pool_ideology_strength: 0.51
  pool_profitability_threshold: 0.16
  pool_max_loss_pct: 0.26
  econ_ideology_strength: 0.40
  econ_switching_threshold: 0.10
  econ_inertia: 0.05
  user_ideology_strength: 0.49
  user_switching_threshold: 0.12
  transaction_velocity: 0.50
  user_nodes_per_partition: 6
  economic_nodes_per_partition: 2
  solo_miner_hashrate: 0.085
  economic_split: 0.78

grid:
  pool_committed_split: [0.20, 0.30, 0.40, 0.50]
