name: sigmoid_2016_retarget
description: >
  Tests Proposal 2 (Biais et al. 2019 sigmoid) in the 2016-block retarget regime.

  Sweep10b (baseline oracle) showed all 5 econ levels going v27_dominant via the
  retarget cascade. The sigmoid oracle created 2.7x higher pool opportunity costs
  in the 144-block test (sweep_0001: $2.49M vs $922K baseline). The question is
  whether this amplified pricing changes cascade timing or flips outcomes in the
  2016-block regime where the retarget cascade is the dominant mechanism.

  Research question: Does sigmoid change the minimum economic_split needed for v27
  to win via the 2016-block retarget cascade? Specifically, does econ=0.50 or 0.35
  flip outcomes that were v27_dominant in sweep10b?

  Run across FOUR namespaces for faster completion (split scenarios across pairs):

    Sweep A — baseline, scenarios 0-2 (econ=0.35, 0.50, 0.60):
      python 3_run_sweep.py \
        --input sigmoid_2016_retarget/build_manifest.json \
        --namespace sweep-2016-base-a \
        --results-dir sigmoid_2016_retarget/results_baseline \
        --duration 13000 --retarget-interval 2016 --interval 2 \
        --scenarios sweep_0000 sweep_0001 sweep_0002

    Sweep B — baseline, scenarios 3-4 (econ=0.70, 0.82):
      python 3_run_sweep.py \
        --input sigmoid_2016_retarget/build_manifest.json \
        --namespace sweep-2016-base-b \
        --results-dir sigmoid_2016_retarget/results_baseline \
        --duration 13000 --retarget-interval 2016 --interval 2 \
        --scenarios sweep_0003 sweep_0004

    Sweep C — sigmoid, scenarios 0-2 (econ=0.35, 0.50, 0.60):
      python 3_run_sweep.py \
        --input sigmoid_2016_retarget/build_manifest.json \
        --namespace sweep-2016-sig-a \
        --results-dir sigmoid_2016_retarget/results_sigmoid \
        --duration 13000 --retarget-interval 2016 --interval 2 \
        --use-sigmoid \
        --scenarios sweep_0000 sweep_0001 sweep_0002

    Sweep D — sigmoid, scenarios 3-4 (econ=0.70, 0.82):
      python 3_run_sweep.py \
        --input sigmoid_2016_retarget/build_manifest.json \
        --namespace sweep-2016-sig-b \
        --results-dir sigmoid_2016_retarget/results_sigmoid \
        --duration 13000 --retarget-interval 2016 --interval 2 \
        --use-sigmoid \
        --scenarios sweep_0003 sweep_0004

  Namespaces to create first:
    kubectl create namespace sweep-2016-base-a
    kubectl create namespace sweep-2016-base-b
    kubectl create namespace sweep-2016-sig-a
    kubectl create namespace sweep-2016-sig-b

  Wall-clock estimate with 4 parallel namespaces:
    A+C run simultaneously: 3 scenarios x 13,000s = ~11h
    B+D run simultaneously: 2 scenarios x 13,000s = ~7.5h
    Overall bottleneck: ~11h (done by morning)

  NOTE: Sweeps A+B share results_baseline dir; C+D share results_sigmoid dir.
  The sweep runner handles concurrent writes safely (different scenario subdirs).

network: lite

fixed:
  hashrate_split: 0.50
  pool_committed_split: 0.35
  pool_neutral_pct: 30.0
  pool_ideology_strength: 0.51
  pool_profitability_threshold: 0.16
  pool_max_loss_pct: 0.26
  econ_ideology_strength: 0.40
  econ_switching_threshold: 0.14
  econ_inertia: 0.17
  user_ideology_strength: 0.49
  user_switching_threshold: 0.12
  transaction_velocity: 0.50
  user_nodes_per_partition: 6
  economic_nodes_per_partition: 2
  solo_miner_hashrate: 0.085

grid:
  economic_split: [0.35, 0.50, 0.60, 0.70, 0.82]
