name: econ_committed_2016_grid
description: >
  Full 5×9 economic_split × pool_committed_split grid at 2016-block retarget interval.
  Direct companion to targeted_sweep1_committed_threshold (144-block, same grid), enabling
  a clean regime comparison for paper §4.5 Table 6.

  RESEARCH QUESTION:
  targeted_sweep1 (144-block) found:
    - v27 threshold near committed_split ≈ 0.214 at econ=0.78 (Foundry flip-point)
    - v27 threshold near econ ≈ 0.82 at committed_split=0.35 (economic majority threshold)
  Do these thresholds shift in the 2016-block regime, where v27 must accumulate 2016
  blocks before the retarget cascade fires? Does slower difficulty adjustment change
  the shape or slope of the decision boundary?

  WHAT WE ALREADY KNOW (from committed_2016_high_econ/mid_econ, 2026-03-16):
  - committed_split threshold is ∈(0.20, 0.30) at econ=0.55 and econ=0.78 in 2016-block
  - This matches the 144-block boundary (~0.214) — retarget regime does NOT shift the threshold
  - cascade_t ≈ 8426s for all 1-node v27-dominant scenarios (baseline oracle)
  - Economic quantization boundary unchanged: econ ≥ ~0.30 → 1 node on v27
  This grid fills in the full boundary shape and provides the Table 6 data.

  PRIOR CONTEXT:
  - targeted_sweep1 used old econ switching params (threshold=0.14, inertia=0.17)
  - This sweep uses validated params (threshold=0.10, inertia=0.05) matching all v2 sweeps
  - hashrate_split=0.25 (v26 hash-dominant) isolates cascade mechanism — same as sweep1
  - Full 60-node network (same as targeted_sweep1)

  EXPECTED OUTCOMES:
  - econ=0.82 column: fast cascade (~607s), v27 wins across most committed_split values
  - econ=0.35–0.70 columns: v27 wins only when committed_split ≥ ~0.30
  - committed_split=0.20 row: all v26_dominant (0 econ nodes on v27 via quantization)
  - The 2D boundary shape should closely match targeted_sweep1 (144-block)
  - If boundary shifts, that is the key 2016-block retarget effect on committed threshold

  PARALLELIZATION (large server):
  45 scenarios total. Recommended: 9 namespaces × 5 scenarios each (one per committed_split
  value), running 5 scenarios sequentially per namespace.
    Wall-clock: 5 × 13,000s = 65,000s ≈ 18h per namespace (all 9 finish simultaneously)

  Alternatively: 45 namespaces × 1 scenario = 13,000s ≈ 3.6h (maximum parallelism).

  Run command (9-namespace split, one namespace per committed_split value):
    for ns in grid2016-c0 grid2016-c1 grid2016-c2 grid2016-c3 grid2016-c4 \
              grid2016-c5 grid2016-c6 grid2016-c7 grid2016-c8; do
      kubectl create namespace $ns
    done

    # committed_split=0.20 (sweep_0000..0004)
    python tools/sweep/3_run_sweep.py \
      --input tools/sweep/econ_committed_2016_grid/build_manifest.json \
      --scenarios sweep_0000 sweep_0001 sweep_0002 sweep_0003 sweep_0004 \
      --namespace grid2016-c0 \
      --results-dir econ_committed_2016_grid/results \
      --duration 13000 --retarget-interval 2016 --interval 2 &

    # (repeat for each committed_split group — see build manifest for scenario ordering)

network: full

fixed:
  hashrate_split: 0.25
  pool_neutral_pct: 30.0
  pool_ideology_strength: 0.51
  pool_profitability_threshold: 0.16
  pool_max_loss_pct: 0.26
  econ_ideology_strength: 0.40
  econ_switching_threshold: 0.10
  econ_inertia: 0.05
  user_ideology_strength: 0.49
  user_switching_threshold: 0.12
  transaction_velocity: 0.50
  user_nodes_per_partition: 6
  economic_nodes_per_partition: 2
  solo_miner_hashrate: 0.085

grid:
  economic_split:       [0.35, 0.50, 0.60, 0.70, 0.82]
  pool_committed_split: [0.20, 0.30, 0.38, 0.43, 0.47, 0.52, 0.58, 0.65, 0.75]
