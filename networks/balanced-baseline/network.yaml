# Balanced Baseline Network
#
# A perfectly symmetric network for measuring stochastic variance at the decision boundary.
# Neither v27 nor v26 has any structural advantage.
#
# Total: 24 nodes (12 per partition)
# - Mining Pools: 4 per side (50% hashrate each side)
# - Economic Nodes: 2 per side (equal custody)
# - User Nodes: 6 per side (equal characteristics)
#
# Hashrate distribution:
# - V27 pools: 47% (named pools)
# - V26 pools: 47% (named pools)
# - V27 users: 3% (diffuse mining)
# - V26 users: 3% (diffuse mining)
#
# All behavioral parameters (ideology_strength, switching_threshold, etc.) are symmetric.

caddy:
  enabled: true
fork_observer:
  enabled: false
  configQueryInterval: 10

nodes:
# =============================================================================
# V27 PARTITION (nodes 0-11)
