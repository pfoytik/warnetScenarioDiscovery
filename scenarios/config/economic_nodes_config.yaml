realistic_current:
  description: Exchanges mostly rational, users more ideological
  economic_defaults:
    fork_preference: neutral
    ideology_strength: 0.1
    switching_threshold: 0.03
    inertia: 0.15
    switching_cooldown: 1800
    max_loss_pct: 0.05
  user_defaults:
    fork_preference: neutral
    ideology_strength: 0.3
    switching_threshold: 0.08
    inertia: 0.05
    switching_cooldown: 3600
    max_loss_pct: 0.15
  overrides:
    major_exchange:
      fork_preference: neutral
      ideology_strength: 0.0
      switching_threshold: 0.02
      inertia: 0.2
    exchange:
      fork_preference: neutral
      ideology_strength: 0.05
      switching_threshold: 0.03
      inertia: 0.15
    payment_processor:
      fork_preference: v26
      ideology_strength: 0.2
      switching_threshold: 0.05
      inertia: 0.1
ideological_split:
  description: Strong ideological division among all participants
  economic_defaults:
    switching_threshold: 0.05
    inertia: 0.1
    switching_cooldown: 1200
    max_loss_pct: 0.2
  user_defaults:
    switching_threshold: 0.1
    inertia: 0.03
    switching_cooldown: 1800
    max_loss_pct: 0.3
  overrides:
    major_exchange:
      fork_preference: neutral
      ideology_strength: 0.1
      inertia: 0.15
  distribution_pattern:
    economic:
    - pct: 40
      fork_preference: v27
      ideology_strength: 0.7
    - pct: 40
      fork_preference: v26
      ideology_strength: 0.7
    - pct: 20
      fork_preference: neutral
      ideology_strength: 0.0
    user:
    - pct: 50
      fork_preference: v27
      ideology_strength: 0.8
    - pct: 30
      fork_preference: v26
      ideology_strength: 0.6
    - pct: 20
      fork_preference: neutral
      ideology_strength: 0.1
purely_rational:
  description: All economic actors purely rational (no ideology)
  economic_defaults:
    fork_preference: neutral
    ideology_strength: 0.0
    switching_threshold: 0.02
    inertia: 0.05
    switching_cooldown: 600
    max_loss_pct: 0.0
  user_defaults:
    fork_preference: neutral
    ideology_strength: 0.0
    switching_threshold: 0.05
    inertia: 0.02
    switching_cooldown: 600
    max_loss_pct: 0.0
strong_v26_resistance:
  description: Significant economic resistance to v27 upgrade
  economic_defaults:
    fork_preference: v26
    ideology_strength: 0.5
    switching_threshold: 0.08
    inertia: 0.15
    switching_cooldown: 1800
    max_loss_pct: 0.25
  user_defaults:
    fork_preference: v26
    ideology_strength: 0.6
    switching_threshold: 0.12
    inertia: 0.05
    switching_cooldown: 3600
    max_loss_pct: 0.3
  overrides:
    major_exchange:
      fork_preference: neutral
      ideology_strength: 0.1
      switching_threshold: 0.03
      inertia: 0.2
asymmetric_balanced:
  description: Balanced battle - slight v27 economic edge vs v26 hashrate edge. Moderate
    ideology creates tension.
  economic_defaults:
    switching_threshold: 0.08
    inertia: 0.1
    switching_cooldown: 900
    max_loss_pct: 0.12
  user_defaults:
    switching_threshold: 0.1
    inertia: 0.08
    switching_cooldown: 1200
    max_loss_pct: 0.15
  overrides:
    major_exchange:
      fork_preference: neutral
      ideology_strength: 0.15
      inertia: 0.05
  distribution_pattern:
    economic:
    - pct: 45
      fork_preference: v27
      ideology_strength: 0.4
    - pct: 35
      fork_preference: v26
      ideology_strength: 0.4
    - pct: 20
      fork_preference: neutral
      ideology_strength: 0.1
    user:
    - pct: 40
      fork_preference: v27
      ideology_strength: 0.35
    - pct: 35
      fork_preference: v26
      ideology_strength: 0.35
    - pct: 25
      fork_preference: neutral
      ideology_strength: 0.1
asymmetric_extreme:
  description: Extreme price divergence scenario. v27 economic dominance vs v26 hashrate
    dominance. Low ideology for switching.
  economic_defaults:
    switching_threshold: 0.05
    inertia: 0.02
    switching_cooldown: 600
    max_loss_pct: 0.1
  user_defaults:
    switching_threshold: 0.08
    inertia: 0.03
    switching_cooldown: 900
    max_loss_pct: 0.15
  overrides:
    major_exchange:
      fork_preference: neutral
      ideology_strength: 0.05
      inertia: 0.01
  distribution_pattern:
    economic:
    - pct: 70
