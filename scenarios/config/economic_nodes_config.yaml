      ideology_strength: 0.6
    - pct: 40
      fork_preference: v26
      ideology_strength: 0.4
    - pct: 30
      fork_preference: neutral
      ideology_strength: 0.2
ideological_standoff:
  description: 50/50 economic iron-lock. Neither side switches under any realistic
    price divergence.
  economic_defaults:
    switching_threshold: 0.3
    inertia: 0.3
    switching_cooldown: 7200
    max_loss_pct: 0.5
  user_defaults:
    switching_threshold: 0.25
    inertia: 0.2
    switching_cooldown: 7200
    max_loss_pct: 0.4
  overrides:
    major_exchange:
      fork_preference: neutral
      ideology_strength: 0.5
      inertia: 0.35
  distribution_pattern:
    economic:
    - pct: 50
      fork_preference: v27
      ideology_strength: 0.9
    - pct: 50
      fork_preference: v26
      ideology_strength: 0.9
    user:
    - pct: 50
      fork_preference: v27
      ideology_strength: 0.8
    - pct: 50
      fork_preference: v26
      ideology_strength: 0.8
