  description: Non-contentious soft fork economic distribution. v27 minority with
    committed supporters.
  economic_defaults:
    switching_threshold: 0.12
    inertia: 0.15
    switching_cooldown: 1200
    max_loss_pct: 0.25
  user_defaults:
    switching_threshold: 0.1
    inertia: 0.05
    switching_cooldown: 1800
    max_loss_pct: 0.15
  overrides:
    major_exchange:
      fork_preference: neutral
      ideology_strength: 0.2
      inertia: 0.2
  distribution_pattern:
    economic:
    - pct: 35
      fork_preference: v27
      ideology_strength: 0.7
    - pct: 45
      fork_preference: v26
      ideology_strength: 0.5
    - pct: 20
      fork_preference: neutral
      ideology_strength: 0.1
    user:
