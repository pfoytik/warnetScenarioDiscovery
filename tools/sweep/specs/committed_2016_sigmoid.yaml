name: committed_2016_sigmoid
description: >
  Maps the committed_split threshold in the 2016-block retarget regime with the sigmoid
  price oracle enabled. Companion to committed_2016_high_econ (same econ=0.78, baseline).

  RESEARCH QUESTION:
  Sigmoid halved cascade time (8426s → 4239s) and halved v26 block accumulation (1543 → 799)
  at committed_split=0.35. Does sigmoid LOWER the committed_split threshold? If sigmoid fires
  the cascade earlier, v27 might win even with a lower committed_split where baseline fails.

  MECHANISM:
  Sigmoid amplifies the price signal: larger price gaps → faster neutral pool drift → v27
  accumulates 2016 blocks faster. At low committed_split values where baseline v27 stalls
  (not enough hashrate to hit 2016 blocks before v26 retargets), sigmoid's faster neutral
  pool convergence might tip the balance.

  PRIOR CONTEXT:
  - At committed_split=0.35 with sigmoid: cascade_t=4239s vs 8426s baseline (2x faster)
  - v26 block count drops from 1543 to 799 with sigmoid (fewer v26 blocks before cascade)
  - At econ=0.82 (2 nodes): cascade so fast (607s) that sigmoid makes no difference
  - Peak price gap: 21.6% sigmoid vs 16.1% baseline at 1-node econ level

  EXPECTED OUTCOMES:
  - committed_split=0.50: v27 wins with both oracles — sigmoid fires faster
  - committed_split=0.30: baseline may stall, sigmoid may still win (threshold test)
  - committed_split=0.20: probably v26_dominant even with sigmoid

  COMMITTED_SPLIT INTERPRETATION:
    committed_split=0.20: v27=14%, v26=56%, neutral=30%
    committed_split=0.30: v27=21%, v26=49%, neutral=30%
    committed_split=0.40: v27=28%, v26=42%, neutral=30%
    committed_split=0.50: v27=35%, v26=35%, neutral=30%  (symmetric)

  Run command:
    python tools/sweep/3_run_sweep.py \
      --input tools/sweep/committed_2016_sigmoid/build_manifest.json \
      --namespace sweep-com2016-sig \
      --results-dir committed_2016_sigmoid/results \
      --duration 13000 --retarget-interval 2016 --interval 2 \
      --use-sigmoid

  Namespace to create first:
    kubectl create namespace sweep-com2016-sig

  Wall-clock: 4 scenarios × 13,000s = 52,000s ≈ 14.4h

network: lite

fixed:
  hashrate_split: 0.50
  pool_neutral_pct: 30.0
  pool_ideology_strength: 0.51
  pool_profitability_threshold: 0.16
  pool_max_loss_pct: 0.26
  econ_ideology_strength: 0.40
  econ_switching_threshold: 0.10
  econ_inertia: 0.05
  user_ideology_strength: 0.49
  user_switching_threshold: 0.12
  transaction_velocity: 0.50
  user_nodes_per_partition: 6
  economic_nodes_per_partition: 2
  solo_miner_hashrate: 0.085
  economic_split: 0.78

grid:
  pool_committed_split: [0.20, 0.30, 0.40, 0.50]
