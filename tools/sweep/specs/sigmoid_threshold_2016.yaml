name: sigmoid_threshold_2016
description: >
  Finds the economic_split threshold for v27 victory in the 2016-block retarget
  regime WITH the sigmoid price oracle enabled.

  MOTIVATION:
  sigmoid_2016_retarget showed that sigmoid fires the pool cascade ~4,185s earlier
  (t≈4,241s vs t≈8,426s baseline) and cuts v26 block count by ~48% (799 vs 1,543).
  Critically, sigmoid tested econ=[0.35, 0.50, 0.60, 0.70] and ALL gave v27_dominant.
  The baseline threshold is bracketed at (0.50, 0.55) — but under sigmoid econ=0.35
  is STILL v27_dominant. So the sigmoid threshold is somewhere below 0.35.

  Research question: What is the minimum economic_split for v27 to win under the
  sigmoid oracle + 2016-block retarget regime? Does v26 ever win?

  PRICE ORACLE MATH (sigmoid starting gap at 50/50 hashrate):
    econ=0.20 → v26 premium ~12.8% — neutral pools strongly prefer v26 from t=0
    econ=0.25 → v26 premium ~8.0%  — moderate v26 preference
    econ=0.30 → v26 premium ~3.6%  — weak v26 preference; sigmoid may amplify this

  The committed v27 pool tolerance is 0.51 × 0.26 = 13.26%. The sigmoid amplifies
  price gaps relative to baseline — so a 12.8% initial gap under baseline may push
  above 13.26% under sigmoid, potentially enabling a v26 cascade even before retarget.

  EXPECTED OUTCOMES:
    econ=0.20: v26 cascade possible; if price gap under sigmoid > 13.26% → v26_dominant
    econ=0.25: borderline; likely v27_dominant but later/closer cascade
    econ=0.30: v27_dominant; similar to econ=0.35 baseline

  PRIOR RESULTS FOR CONTEXT:
    econ=0.20 (144-block, baseline): v26_dominant (cascade at t=624s, 1846 v26 blocks)
    econ=0.35 (2016-block, sigmoid): v27_dominant (cascade at t=4,241s, 799 v26 blocks)
    econ=0.50 (2016-block, baseline): v26_dominant (197 v27 blocks — sweep_11)

  Run across TWO namespaces for parallelism:

    Namespace A — scenarios 0-1 (econ=0.20, 0.25):
      python 3_run_sweep.py \
        --input sigmoid_threshold_2016/build_manifest.json \
        --namespace sweep-sig-thresh-a \
        --results-dir sigmoid_threshold_2016/results \
        --duration 9000 --retarget-interval 2016 --interval 2 \
        --use-sigmoid \
        --scenarios sweep_0000 sweep_0001

    Namespace B — scenario 2 (econ=0.30):
      python 3_run_sweep.py \
        --input sigmoid_threshold_2016/build_manifest.json \
        --namespace sweep-sig-thresh-b \
        --results-dir sigmoid_threshold_2016/results \
        --duration 9000 --retarget-interval 2016 --interval 2 \
        --use-sigmoid \
        --scenarios sweep_0002

  Namespaces to create first:
    kubectl create namespace sweep-sig-thresh-a
    kubectl create namespace sweep-sig-thresh-b

  Wall-clock estimate:
    Namespace A: 2 scenarios × 9,000s = ~5h
    Namespace B: 1 scenario  × 9,000s = ~2.5h
    Overall bottleneck: ~5h

  NOTE: Both namespaces write to the same results dir (different scenario subdirs).

network: lite

fixed:
  hashrate_split: 0.50
  pool_committed_split: 0.35
  pool_neutral_pct: 30.0
  pool_ideology_strength: 0.51
  pool_profitability_threshold: 0.16
  pool_max_loss_pct: 0.26
  econ_ideology_strength: 0.40
  econ_switching_threshold: 0.10
  econ_inertia: 0.05
  user_ideology_strength: 0.49
  user_switching_threshold: 0.12
  transaction_velocity: 0.50
  user_nodes_per_partition: 6
  economic_nodes_per_partition: 2
  solo_miner_hashrate: 0.085

grid:
  economic_split: [0.20, 0.25, 0.30]
